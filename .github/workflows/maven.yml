name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      # Added 'clean' to ensure a fresh build
      run: mvn -B clean package --file pom.xml

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

    # NEW: This saves the compiled JAR so you can download it from GitHub
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Minecraft-Plugin-JAR
        # Grabs the compiled jar from the target folder. 
        # If you use the maven-shade-plugin, you might want to specify your exact jar name 
        # to avoid uploading the 'original-*.jar' file as well.
        path: target/*.jar
